name: PR CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Node repo on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check:syntax

      - name: Test suite
        run: npm test

      - name: Startup sanity
        run: npm run ci:startup
